# --- General Settings ---
unbind r
bind r source-file $HOME/.config/tmux/tmux.conf \; display "Reloaded!"

# Force tmux to use a non-login shell to reach ~/.bashrc
set-option -g default-command "bash"

# Set [SPACEBAR] as [PREFIX-KEY]
set -g prefix C-Space
bind C-Space send-prefix

# Optimization: Refresh status line faster for Dracula
set -g status-interval 1

# Window/Pane Management
setw -g xterm-keys on
setw -g automatic-rename on
set-option -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1

# Vim-like Navigation
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'dracula/tmux'

# --- Dracula Configuration ---
set -g @dracula-plugins "cpu-usage ram-usage gpu-usage"
set -g @dracula-show-powerline true
set -g @dracula-show-flags true
set -g @dracula-show-left-icon "#(date +'%a %m/%d/%y %I:%M %p %Z')"
set -g status-position top

# Labels & Colors
set -g @dracula-cpu-label "CPU"
set -g @dracula-gpu-label "GPU"
set -g @dracula-gpu-usage-colors "orange dark_gray"
set -g @dracula-cpu-usage-colors "pink dark_gray"

# Formatting
set -g @dracula-show-window-index false
set -g @dracula-pane-index '#W'
set -g @dracula-window-format '#W'
set -g @dracula-refresh-rate 1

# --- Initialize TMUX Plugin Manager ---
# (This loads the theme and applies the purple border)
run ' "$(cat $HOME/.config/tmux/tmux.meta)/plugins/tpm/tpm" '

# ==========================================
#       OVERRIDES (MUST BE AFTER TPM)
# ==========================================

# 1. Enable Bottom Border
set-option -g pane-border-status bottom

# 2. Force Green Active Border
# The plugin loaded above set this to purple; we are setting it back to green (#5fff87)
set -g pane-active-border-style "bg=default fg=#5fff87"
set -g pane-border-style "bg=default fg=#4e4e4e"

# 3. Custom Border Script
# Make an alias to the function 'term_depth_script' as #{@term_depth_script}
run-shell 'tmux set-option -g @term_depth_script "$(cat $HOME/.config/tmux/tmux.meta)/plugins/tmux/scripts/term_depth"'

# Reference the script: term_depth_script(pid, path)
set-window-option -g pane-border-format "#( #{@term_depth_script} #{pane_pid} '#{pane_current_path}' )"
