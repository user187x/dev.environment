apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-shim-script
  namespace: traefik-system # Or wherever your traefik lives
data:
  main.py: |
    from flask import Flask, request, Response
    import requests
    import os

    app = Flask(__name__)

    # Configuration from Env Vars
    TARGET_URL_BASE = os.environ.get('TARGET_URL_BASE', 'http://checktherealguy.com/dn/')

    @app.route('/verify', methods=['GET'])
    def verify():
        # 1. Extract DN from headers passed by Traefik
        # Ensure your client sends this or Traefik extracts it from mTLS
        user_dn = request.headers.get('X-User-DN')

        if not user_dn:
            print("Error: No X-User-DN header found")
            return Response("Missing X-User-DN Header", status=401)

        # 2. Construct the dynamic URL
        # Logic: Base URL + DN
        external_url = f"{TARGET_URL_BASE}{user_dn}"
        print(f"Verifying user against: {external_url}")

        try:
            # 3. Call the external service
            resp = requests.get(external_url, timeout=5)

            if resp.status_code != 200:
                return Response("Access Denied", status=403)

            # 4. Extract enrichment data (Customize this based on external API response)
            # Example: assuming external API returns JSON like {"role": "admin"}
            try:
                data = resp.json()
                role = data.get('role', 'user')
            except:
                role = "guest"

            # 5. Return 200 to Traefik with NEW headers to inject
            return Response("OK", status=200, headers={
                'X-Enriched-Role': role,
                'X-Auth-User': user_dn
            })

        except Exception as e:
            print(f"External call failed: {e}")
            return Response("Auth Error", status=500)

    if __name__ == "__main__":
        app.run(host='0.0.0.0', port=8000)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-shim
  namespace: traefik-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-shim
  template:
    metadata:
      labels:
        app: auth-shim
    spec:
      containers:
        - name: shim
          image: python:3.9-slim
          # Magic Line: Install Flask/Requests on startup, then run script
          command: ["/bin/sh", "-c", "pip install flask requests && python /app/main.py"]
          ports:
            - containerPort: 8000
          env:
            - name: TARGET_URL_BASE
              value: "http://checktherealguy.com/dn/"
          volumeMounts:
            - name: script-volume
              mountPath: /app
      volumes:
        - name: script-volume
          configMap:
            name: auth-shim-script
---
apiVersion: v1
kind: Service
metadata:
  name: auth-shim
  namespace: traefik-system
spec:
  ports:
    - port: 80
      targetPort: 8000
  selector:
    app: auth-shim
