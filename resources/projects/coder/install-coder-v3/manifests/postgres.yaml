---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels: { app: postgres }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: coder-pg-credentials, key: username } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: coder-pg-credentials, key: password } }
            - name: POSTGRES_DB
              valueFrom: { secretKeyRef: { name: coder-pg-credentials, key: database } }
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - { containerPort: 5432 }
          readinessProbe:
            exec: { command: [pg_isready, -U, coder, -d, coder] }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec: { command: [pg_isready, -U, coder, -d, coder] }
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: "1",  memory: 1Gi }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: postgres-pvc }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector: { app: postgres }
  ports:
    - { port: 5432, targetPort: 5432 }
